<body class="noise bg-slate-50 text-slate-950 font-sans">
  <div id="root"></div>
  <script type="text/babel">
    const {useEffect, useState} = React;

    const questions = [
      {topic:'Алгебра / Алгебра', q:'Егер x + 1/x = 5 болса, x² + 1/x² мәнін табыңыз. / Если x + 1/x = 5, найдите x² + 1/x².', a:['21','23','25','27'], correct:1, exp:'(x+1/x)² = x²+2+1/x², сондықтан 25-2=23. / Значит 25-2=23.'},
      {topic:'Функциялар / Функции', q:'f(x)=2x−3, g(x)=x²+1. f(g(3)) мәні қандай? / Чему равно f(g(3))?', a:['17','19','21','23'], correct:0, exp:'g(3)=10, f(10)=20−3=17. / Сначала g(3)=10, потом f(10)=17.'},
      {topic:'Теңдеулер / Уравнения', q:'x²−6x+5=0 теңдеуінің түбірлерінің көбейтіндісі? / Произведение корней уравнения x²−6x+5=0?', a:['-6','1','5','6'], correct:2, exp:'Виет теоремасы бойынша көбейтінді c/a=5. / По Виету произведение равно c/a=5.'},
      {topic:'Логика / Логика', q:'Барлық A — B. Кейбір B — C. Қай тұжырым міндетті түрде дұрыс? / Все A — B. Некоторые B — C. Что обязательно верно?', a:['Барлық A — C / Все A — C','Кейбір A — C / Некоторые A — C','Кейбір B — A / Некоторые B — A','Міндетті қорытынды жоқ / Обязательного вывода нет'], correct:3, exp:'B мен C қиылысы A-мен байланысты болмауы мүмкін. / Пересечение B и C может не касаться A.'},
      {topic:'Олимпиадалық ойлау / Олимпиадное мышление', q:'a,b>0 және a+b=10. ab ең үлкен мәні? / a,b>0 и a+b=10. Максимум ab?', a:['20','24','25','30'], correct:2, exp:'AM-GM бойынша максимум a=b=5 кезінде, ab=25. / По AM-GM максимум при a=b=5.'},
      {topic:'Функциялар / Функции', q:'y=(x−2)²+3 функциясының ең кіші мәні? / Минимальное значение y=(x−2)²+3?', a:['0','2','3','5'], correct:2, exp:'Квадрат әрқашан ≥0, минимум x=2 кезінде y=3. / Квадрат неотрицателен, минимум 3.'},
      {topic:'Алгебра / Алгебра', q:'2^(x+1)=16 болса, x=? / Если 2^(x+1)=16, то x=?', a:['2','3','4','5'], correct:1, exp:'16=2⁴, x+1=4, x=3. / 16=2⁴, значит x=3.'},
      {topic:'Логика / Логика', q:'Қатарды жалғастырыңыз: 2, 6, 12, 20, 30, ? / Продолжите ряд: 2, 6, 12, 20, 30, ?', a:['40','42','44','46'], correct:1, exp:'n(n+1): 1·2,2·3,3·4... келесі 6·7=42. / Это n(n+1), следующий 42.'},
      {topic:'Теңсіздік / Неравенства', q:'x²−4x+4 ≥ 0 туралы не айтуға болады? / Что верно для x²−4x+4 ≥ 0?', a:['Тек x=2 / Только x=2','Барлық нақты x / Все реальные x','x>2 ғана / Только x>2','Шешімі жоқ / Нет решений'], correct:1, exp:'x²−4x+4=(x−2)², квадрат барлық x үшін ≥0. / Квадрат всегда неотрицателен.'},
      {topic:'Комбинаторика / Комбинаторика', q:'5 түрлі кітапты сөреге неше тәсілмен орналастыруға болады? / Сколькими способами можно расставить 5 разных книг?', a:['20','60','120','240'], correct:2, exp:'5! = 120. / Количество перестановок пяти разных предметов равно 120.'}
    ];

    const dict = {
      kk: {
        nav1:'Жүйе', nav2:'Артықшылық', nav3:'Тест', lang:'Қазақша', other:'Русский', heroTitle:'Практикалық есептерді автоматты тексеру жүйесі',
        heroSub:'Математикадан практикалық есептерді автоматты тексеретін, қателерді талдайтын және оқушыға тезірек үйренуге көмектесетін заманауи интеллектуалды жүйе.',
        start:'Тесті бастау', see:'Жүйені көру', badge:'Premium EdTech platform · 2025 UI', live:'Live checking', challenge:'Algebra Challenge',
        aboutTitle:'Жүйе қалай жұмыс істейді?', aboutSub:'Платформа оқушының жауабын қабылдайды, дұрыс нұсқамен салыстырады, тақырыпты анықтайды және нәтижеге қарай нақты ұсыныстар береді.',
        cards:[['⚡','Мгновенная тексеру','Жауап таңдалғаннан кейін жүйе бірден нәтижені есептеп, дұрыс шешім логикасын түсіндіреді.'],['🧠','Адаптивті күрделілік','Сұрақтар алгебра, функция, логика және олимпиадалық ойлауды біріктіреді.'],['📊','Ақылды аналитика','Қателер тақырыптар бойынша бөлінеді және қай жерде әлсіздік бар екенін нақты көрсетеді.'],['✨','Жай тест емес','Бұл жаттап алу емес, ойлау қабілетін дамытатын интерактивті оқу ортасы.']],
        benefitsTitle:'Неге бұл қарапайым тесттен жақсы?', benefits:[['AI-проверка','Жауапты ғана емес, тақырып пен шешу логикасын талдайды.'],['Дәлдік','Әр сұрақта түсіндірме және нақты математикалық негіз бар.'],['Уақыт үнемдеу','Мұғалімге де, оқушыға да нәтижені тез көруге көмектеседі.'],['Ойлауды дамыту','Қиын есептер арқылы логикалық және аналитикалық ойлау дамиды.']],
        stepsTitle:'Тест қалай өтеді?', steps:['Тест таңдау','Есеп шешу','Автоматты тексеру','Нәтиже және кеңес'], stepText:'Әр қадам жеңіл, түсінікті және интерактивті түрде жасалған.', cta:'Қазір тестілеуді бастау',
        q:'Сұрақ', testTitle:'Жоғары деңгейлі математика тесті', back:'Артқа', next:'Далее', resultBtn:'Нәтижені көру', result:'Нәтиже', retry:'Қайта тапсыру', correct:'Дұрыс жауаптар', analysis:'Қателер анализі', rec:'Ұсыныстар', correctAnswer:'Дұрыс жауап', allGood:'Барлық сұрақ дұрыс. Келесі деңгейге өтуге дайынсың.', wrongTopics:'Қате кеткен негізгі тақырыптар:', repeat:'Осы бөлімдерді қайталап, ұқсас есептерді көбірек шешу ұсынылады.', recs:['Квадрат теңдеулер мен дискриминантты қайталау','Функция ішіндегі функция есептерін жаттықтыру','Логикалық қатарлар мен AM-GM теңсіздігін үйрену']
      },
      ru: {
        nav1:'Система', nav2:'Преимущества', nav3:'Тест', lang:'Русский', other:'Қазақша', heroTitle:'Система автоматической проверки практических задач',
        heroSub:'Современная интеллектуальная платформа для автоматической проверки практических задач по математике, анализа ошибок и ускоренного обучения.',
        start:'Начать тест', see:'Посмотреть систему', badge:'Премиальная EdTech-платформа · UI 2025', live:'Живая проверка', challenge:'Алгебраический вызов',
        aboutTitle:'Как работает система?', aboutSub:'Платформа принимает ответ ученика, сравнивает его с правильным решением, определяет тему ошибки и формирует персональные рекомендации.',
        cards:[['⚡','Мгновенная проверка','После выбора ответа система сразу показывает результат и объясняет логику правильного решения.'],['🧠','Адаптивная сложность','Вопросы объединяют алгебру, функции, логику и элементы олимпиадного мышления.'],['📊','Умная аналитика','Ошибки распределяются по темам, чтобы сразу было видно слабые места.'],['✨','Не просто тест','Это интерактивная учебная среда, которая развивает мышление, а не только проверяет память.']],
        benefitsTitle:'Почему это лучше обычных тестов?', benefits:[['AI-проверка','Анализирует не только ответ, но и тему, логику и тип ошибки.'],['Точность','У каждого вопроса есть объяснение и понятная математическая основа.'],['Экономия времени','Помогает учителю и ученику быстрее увидеть результат.'],['Развитие мышления','Сложные задачи прокачивают логику и аналитическое мышление.']],
        stepsTitle:'Как проходит тест?', steps:['Выбор теста','Решение задачи','Автоматическая проверка','Результат и советы'], stepText:'Каждый шаг сделан понятным, интерактивным и приятным.', cta:'Начать тестирование',
        q:'Вопрос', testTitle:'Математический тест высокого уровня', back:'Назад', next:'Далее', resultBtn:'Показать результат', result:'Результат', retry:'Пройти заново', correct:'Правильные ответы', analysis:'Анализ ошибок', rec:'Рекомендации', correctAnswer:'Правильный ответ', allGood:'Все вопросы решены правильно. Ты готов перейти на следующий уровень.', wrongTopics:'Основные темы ошибок:', repeat:'Повтори эти разделы и реши больше похожих задач.', recs:['Повторить квадратные уравнения и дискриминант','Потренировать композицию функций','Разобрать логические ряды и неравенство AM-GM']
      }
    };

    function Bg(){return <div className="pointer-events-none fixed inset-0 -z-10"><div className="absolute -top-48 left-1/2 h-[520px] w-[520px] -translate-x-1/2 rounded-full bg-indigo-500/20 blur-3xl animate-pulseSoft"></div><div className="absolute top-36 -left-28 h-80 w-80 rounded-full bg-cyan-400/20 blur-3xl animate-float"></div><div className="absolute bottom-10 right-0 h-96 w-96 rounded-full bg-violet-500/20 blur-3xl animate-floatSlow"></div></div>}
    function Icon({children}){return <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-50 text-2xl shadow-sm">{children}</div>}
    function Shell({children, lang, setLang}){const t=dict[lang];return <><Bg/><header className="sticky top-0 z-50 mx-auto max-w-7xl px-4 py-4"><div className="glass flex items-center justify-between rounded-3xl px-4 py-3 shadow-soft"><div className="flex items-center gap-3"><div className="h-10 w-10 rounded-2xl aurora shadow-glow"></div><span className="font-black tracking-tight">MathCheck AI</span></div><nav className="hidden gap-7 text-sm font-semibold text-slate-600 md:flex"><a href="#about">{t.nav1}</a><a href="#benefits">{t.nav2}</a><a href="#steps">{t.nav3}</a></nav><button onClick={()=>setLang(lang==='kk'?'ru':'kk')} className="rounded-2xl bg-slate-950 px-4 py-2 text-sm font-bold text-white transition hover:scale-105">{t.lang} → {t.other}</button></div></header>{children}<footer className="mx-auto max-w-7xl px-4 pb-10 pt-16 text-center text-sm font-semibold text-slate-500">© 2026 MathCheck AI · Premium EdTech UI</footer></>}

    function Home({start, lang, setLang}){const t=dict[lang];useEffect(()=>{const io=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('show')),{threshold:.15});document.querySelectorAll('.reveal').forEach(el=>io.observe(el));return()=>io.disconnect()},[lang]);return <Shell lang={lang} setLang={setLang}><section className="mx-auto grid max-w-7xl items-center gap-12 px-4 pb-24 pt-16 md:grid-cols-2 md:pt-28"><div className="animate-fadeUp"><div className="mb-6 inline-flex rounded-full border border-indigo-200 bg-white/70 px-4 py-2 text-sm font-bold text-indigo-700 shadow-sm">{t.badge}</div><h1 className="text-5xl font-black leading-[1.02] tracking-[-.055em] text-slate-950 md:text-7xl">{t.heroTitle}</h1><p className="mt-7 max-w-xl text-lg leading-8 text-slate-600">{t.heroSub}</p><div className="mt-9 flex flex-wrap gap-4"><button onClick={start} className="aurora rounded-2xl px-7 py-4 font-black text-white shadow-glow transition hover:scale-105">{t.start}</button><a href="#about" className="rounded-2xl bg-white px-7 py-4 font-black text-slate-900 shadow-soft transition hover:scale-105">{t.see}</a></div></div><div className="relative animate-fadeUp"><div className="glass rounded-[2.2rem] p-5 shadow-soft"><div className="rounded-[1.7rem] bg-slate-950 p-5 text-white shadow-2xl"><div className="mb-6 flex items-center justify-between"><div><p className="text-sm text-slate-400">{t.live}</p><h3 className="text-2xl font-black">{t.challenge}</h3></div><span className="rounded-full bg-emerald-400/15 px-3 py-1 text-sm font-bold text-emerald-300">98%</span></div><div className="space-y-3">{['x² + 1/x²','Adaptive feedback','Olympiad logic'].map((x,i)=><div key={x} className="rounded-2xl border border-white/10 bg-white/5 p-4 transition hover:bg-white/10"><div className="flex items-center justify-between"><span className="font-bold">{x}</span><span>{i===0?'✓':i===1?'AI':'→'}</span></div></div>)}</div><div className="mt-6 h-3 overflow-hidden rounded-full bg-white/10"><div className="h-full w-[78%] rounded-full aurora"></div></div></div></div></div></section><section id="about" className="mx-auto max-w-7xl px-4 py-20"><div className="reveal mb-12 max-w-3xl"><h2 className="text-4xl font-black tracking-tight md:text-5xl">{t.aboutTitle}</h2><p className="mt-5 text-lg leading-8 text-slate-600">{t.aboutSub}</p></div><div className="grid gap-5 md:grid-cols-4">{t.cards.map((c)=><div className="reveal glass group rounded-[2rem] p-6 shadow-soft transition duration-300 hover:-translate-y-2 hover:shadow-glow" key={c[1]}><Icon>{c[0]}</Icon><h3 className="mt-6 text-xl font-black">{c[1]}</h3><p className="mt-3 leading-7 text-slate-600">{c[2]}</p></div>)}</div></section><section id="benefits" className="mx-auto max-w-7xl px-4 py-20"><h2 className="reveal text-4xl font-black md:text-5xl">{t.benefitsTitle}</h2><div className="mt-10 grid gap-5 md:grid-cols-4">{t.benefits.map((b)=><div className="reveal rounded-[2rem] bg-slate-950 p-6 text-white shadow-soft transition hover:-translate-y-2" key={b[0]}><h3 className="text-xl font-black">{b[0]}</h3><p className="mt-3 leading-7 text-slate-300">{b[1]}</p></div>)}</div></section><section id="steps" className="mx-auto max-w-7xl px-4 py-20"><h2 className="reveal text-4xl font-black md:text-5xl">{t.stepsTitle}</h2><div className="mt-10 grid gap-5 md:grid-cols-4">{t.steps.map((s,i)=><div className="reveal glass rounded-[2rem] p-6 shadow-soft" key={s}><div className="mb-5 text-5xl font-black text-indigo-600">0{i+1}</div><h3 className="text-xl font-black">{s}</h3><p className="mt-3 text-slate-600">{t.stepText}</p></div>)}</div></section><section className="mx-auto max-w-6xl px-4 py-20"><div className="reveal overflow-hidden rounded-[2.5rem] bg-slate-950 p-10 text-center text-white shadow-soft md:p-16"><h2 className="text-4xl font-black md:text-6xl">{t.cta}</h2><button onClick={start} className="mt-8 rounded-2xl bg-white px-8 py-4 font-black text-slate-950 shadow-glow transition hover:scale-105">{t.start}</button></div></section></Shell>}

    function Test({finish, lang, setLang}){const t=dict[lang];const [i,setI]=useState(0),[answers,setAnswers]=useState(Array(questions.length).fill(null)),[time,setTime]=useState(900);useEffect(()=>{const tm=setInterval(()=>setTime(v=>Math.max(0,v-1)),1000);return()=>clearInterval(tm)},[]);const q=questions[i],progress=((i+1)/questions.length)*100,pick=v=>{const a=[...answers];a[i]=v;setAnswers(a)};const min=String(Math.floor(time/60)).padStart(2,'0'),sec=String(time%60).padStart(2,'0');return <Shell lang={lang} setLang={setLang}><section className="mx-auto max-w-5xl px-4 py-14"><div className="glass rounded-[2.3rem] p-5 shadow-soft md:p-8"><div className="mb-7 flex flex-wrap items-center justify-between gap-4"><div><p className="font-bold text-indigo-600">{t.q} {i+1} / {questions.length}</p><h1 className="mt-1 text-2xl font-black md:text-4xl">{t.testTitle}</h1></div><div className="rounded-2xl bg-slate-950 px-5 py-3 font-black text-white shadow-soft">⏱ {min}:{sec}</div></div><div className="mb-8 h-3 overflow-hidden rounded-full bg-slate-200"><div className="h-full rounded-full aurora transition-all duration-500" style={{width:progress+'%'}}></div></div><div className="rounded-[2rem] bg-white p-6 shadow-soft md:p-8"><div className="mb-4 inline-flex rounded-full bg-indigo-50 px-3 py-1 text-sm font-black text-indigo-700">{q.topic}</div><h2 className="text-2xl font-black leading-snug md:text-3xl">{q.q}</h2><div className="mt-8 grid gap-4 md:grid-cols-2">{q.a.map((x,idx)=><button key={x} onClick={()=>pick(idx)} className={`rounded-3xl border p-5 text-left text-lg font-black transition duration-300 hover:-translate-y-1 hover:shadow-glow ${answers[i]===idx?'border-indigo-500 bg-indigo-600 text-white shadow-glow':'border-slate-200 bg-white hover:border-indigo-300'}`}><span className="mr-3 text-sm opacity-70">{String.fromCharCode(65+idx)}</span>{x}</button>)}</div></div><div className="mt-8 flex justify-between"><button disabled={i===0} onClick={()=>setI(i-1)} className="rounded-2xl bg-slate-200 px-6 py-3 font-black transition hover:scale-105 disabled:opacity-40">{t.back}</button>{i===questions.length-1?<button onClick={()=>finish(answers)} className="aurora rounded-2xl px-7 py-3 font-black text-white shadow-glow transition hover:scale-105">{t.resultBtn}</button>:<button disabled={answers[i]===null} onClick={()=>setI(i+1)} className="aurora rounded-2xl px-7 py-3 font-black text-white shadow-glow transition hover:scale-105 disabled:opacity-40">{t.next}</button>}</div></div></section></Shell>}

    function Results({answers,restart,lang,setLang}){const t=dict[lang];const score=answers.reduce((s,a,i)=>s+(a===questions[i].correct?1:0),0),percent=Math.round(score/questions.length*100);const grade=percent>=90?(lang==='kk'?'Өте жақсы':'Отлично'):percent>=70?(lang==='kk'?'Жақсы':'Хорошо'):percent>=50?(lang==='kk'?'Орташа':'Средне'):(lang==='kk'?'Қосымша дайындық қажет':'Нужна подготовка');const wrong=questions.map((q,i)=>({q,i,answer:answers[i]})).filter(x=>x.answer!==x.q.correct);const topics=[...new Set(wrong.map(w=>w.q.topic))];return <Shell lang={lang} setLang={setLang}><section className="mx-auto max-w-6xl px-4 py-14"><div className="grid gap-6 md:grid-cols-[.9fr_1.1fr]"><div className="glass rounded-[2.5rem] p-8 shadow-soft"><p className="font-black text-indigo-600">{t.result}</p><h1 className="mt-2 text-6xl font-black tracking-tight">{percent}%</h1><p className="mt-3 text-2xl font-black">{grade}</p><div className="mt-7 h-4 overflow-hidden rounded-full bg-slate-200"><div className="h-full rounded-full aurora" style={{width:percent+'%'}}></div></div><p className="mt-5 text-slate-600">{t.correct}: <b>{score}</b> / {questions.length}</p><button onClick={restart} className="mt-8 w-full rounded-2xl bg-slate-950 px-6 py-4 font-black text-white transition hover:scale-105">{t.retry}</button></div><div className="glass rounded-[2.5rem] p-8 shadow-soft"><h2 className="text-3xl font-black">{t.analysis}</h2><p className="mt-4 leading-8 text-slate-600">{wrong.length?`${t.wrongTopics} ${topics.join(', ')}. ${t.repeat}`:t.allGood}</p><div className="mt-7 space-y-4">{wrong.map(w=><div key={w.i} className="rounded-3xl bg-white p-5 shadow-sm"><h3 className="font-black">{w.i+1}. {w.q.q}</h3><p className="mt-2 text-sm text-slate-500">{t.correctAnswer}: <b>{w.q.a[w.q.correct]}</b></p><p className="mt-2 leading-7 text-slate-600">{w.q.exp}</p></div>)}</div></div></div><div className="mt-6 glass rounded-[2.5rem] p-8 shadow-soft"><h2 className="text-3xl font-black">{t.rec}</h2><div className="mt-5 grid gap-4 md:grid-cols-3">{t.recs.map(r=><div className="rounded-3xl bg-slate-950 p-5 font-bold text-white" key={r}>{r}</div>)}</div></div></section></Shell>}

    function App(){const [page,setPage]=useState('home'),[answers,setAnswers]=useState([]),[lang,setLang]=useState('kk'); const start=()=>{setPage('test');scrollTo(0,0)}; const finish=a=>{setAnswers(a);setPage('results');scrollTo(0,0)}; if(page==='test')return <Test finish={finish} lang={lang} setLang={setLang}/>; if(page==='results')return <Results answers={answers} restart={start} lang={lang} setLang={setLang}/>; return <Home start={start} lang={lang} setLang={setLang}/>}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
